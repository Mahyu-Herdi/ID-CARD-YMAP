<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMAP Enterprise ID</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #F0F2F5; /* Putih Tulang / Bone White */
            --white: #ffffff;
            --shadow: #d1d9e6;
            --text: #44474b;
            --accent: #2d3436;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Claymorphism Container */
        .glass-panel {
            background: var(--bg);
            border-radius: 30px;
            padding: 25px;
            width: 100%; max-width: 400px;
            box-shadow: 20px 20px 60px var(--shadow), -20px -20px 60px var(--white);
            margin-bottom: 30px;
        }

        /* Neumorphism Input */
        input, select, button {
            width: 100%; padding: 15px; margin: 10px 0;
            border: none; border-radius: 15px;
            background: var(--bg);
            box-shadow: inset 6px 6px 12px var(--shadow), inset -6px -6px 12px var(--white);
            box-sizing: border-box; font-family: inherit;
        }

        button {
            box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--white);
            font-weight: 600; cursor: pointer; transition: 0.2s;
            background: var(--bg);
        }

        button:active { box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--white); }

        /* ID Card Layout (ATM SIZE Scale) */
        #id-card {
            width: 320px; height: 500px;
            background: var(--bg);
            border-radius: 25px;
            box-shadow: 15px 15px 35px var(--shadow), -15px -15px 35px var(--white);
            position: relative; overflow: hidden;
            display: none; flex-direction: column; align-items: center; padding: 20px;
        }

        .logo-img { position: absolute; top: 20px; left: 20px; width: 50px; }
        
        .profile-img-frame {
            width: 140px; height: 170px;
            margin-top: 70px; border-radius: 20px;
            background: var(--bg);
            box-shadow: 10px 10px 20px var(--shadow), -10px -10px 20px var(--white);
            overflow: hidden;
        }
        .profile-img-frame img { width: 100%; height: 100%; object-fit: cover; }

        .qr-area {
            width: 70px; height: 70px;
            margin: 15px 0; padding: 5px;
            background: white; border-radius: 12px;
            box-shadow: 5px 5px 10px var(--shadow);
        }

        .info { text-align: center; }
        .info h3 { margin: 5px 0; font-size: 1.2rem; }
        .info p { margin: 2px 0; font-size: 0.85rem; opacity: 0.8; }

        /* List Styling */
        .emp-list { width: 100%; max-width: 400px; }
        .emp-card {
            background: var(--bg);
            padding: 15px; margin: 15px 0; border-radius: 20px;
            box-shadow: 8px 8px 16px var(--shadow), -8px -8px 16px var(--white);
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h2 style="text-align: center;">YMAP Registration</h2>
        <form id="ymapForm">
            <input type="text" id="nama" placeholder="Nama Lengkap" required>
            <input type="text" id="jabatan" placeholder="Jabatan" required>
            <input type="text" id="no_hp" placeholder="Nomor HP / WA" required>
            <input type="text" id="alamat" placeholder="Alamat Sesuai KTP" required>
            <p style="font-size: 12px; margin: 10px 0 0 5px;">Foto Profil:</p>
            <input type="file" id="foto" accept="image/*" required>
            <p style="font-size: 12px; margin: 10px 0 0 5px;">Foto KTP:</p>
            <input type="file" id="ktp" accept="image/*" required>
            <button type="button" onclick="simpanData()" id="btnSubmit">Daftarkan Pegawai</button>
        </form>
    </div>

    <div id="id-card">
        <img src="" id="cardLogo" class="logo-img">
        <div class="profile-img-frame">
            <img src="" id="cardPhoto">
        </div>
        <div id="cardQr" class="qr-area"></div>
        <div class="info">
            <p id="cardId" style="font-weight: bold; color: #888;"></p>
            <h3 id="cardNama">NAMA PEGAWAI</h3>
            <p id="cardJabatan">Jabatan</p>
            <p id="cardHp">0812xxxx</p>
            <p style="margin-top: 10px; color: #27ae60; font-weight: bold; font-size: 10px;">PEGAWAI SAH YMAP</p>
        </div>
    </div>
    <button id="btnDownload" style="display:none; width: 320px; margin-top: 10px;" onclick="downloadPDF()">Download PDF (ATM Size)</button>

    <div class="emp-list" id="empListArea">
        <h3>Daftar Pegawai</h3>
        </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxBhq7Lsstx_R67O8GSJsAY7r9jz4GxHHNT9Pqrjp9qcq80jlB3msC8MRUhZhElJXOQSg/exec"; // <--- ISI INI

        // Fungsi Ambil Data
        async function fetchPegawai() {
            const res = await fetch(API_URL);
            const data = await res.json();
            const container = document.getElementById('empListArea');
            container.innerHTML = '<h3>Daftar Pegawai</h3>';
            
            data.forEach(emp => {
                container.innerHTML += `
                    <div class="emp-card">
                        <div>
                            <b>${emp.nama}</b><br><small>${emp.jabatan}</small>
                        </div>
                        <div>
                            <button onclick="lihatCard('${emp.fileId}')" style="padding: 5px 10px; width: auto;">Card</button>
                            <button onclick="window.open('https://drive.google.com/uc?id=${emp.id_ktp_file}')" style="padding: 5px 10px; width: auto;">KTP</button>
                        </div>
                    </div>
                `;
            });
        }

        // Fungsi Simpan (Konversi ke Base64 dulu)
        async function simpanData() {
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "Sabar, lagi diproses..."; btn.disabled = true;

            const toBase64 = file => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
            });

            const fotoFile = document.getElementById('foto').files[0];
            const ktpFile = document.getElementById('ktp').files[0];

            const payload = {
                formData: {
                    nama: document.getElementById('nama').value,
                    jabatan: document.getElementById('jabatan').value,
                    no_hp: document.getElementById('no_hp').value,
                    alamat: document.getElementById('alamat').value,
                    tgl_daftar: new Date().toLocaleDateString()
                },
                photo: { blob: await toBase64(fotoFile), mimeType: fotoFile.type },
                ktp: { blob: await toBase64(ktpFile), mimeType: ktpFile.type }
            };

            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("Berhasil!");
            location.reload();
        }

        function lihatCard(id) {
            // Logika untuk menampilkan data ke #id-card
            // Sertakan generator QR Code disini
            document.getElementById('id-card').style.display = 'flex';
            document.getElementById('btnDownload').style.display = 'block';
            // (Tambahkan logika mapping data ke element preview)
        }

        async function downloadPDF() {
            const card = document.getElementById('id-card');
            const canvas = await html2canvas(card);
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', [85.6, 54]); // Ukuran Standar ATM
            pdf.addImage(imgData, 'PNG', 0, 0, 54, 85.6);
            pdf.save("ID_CARD_YMAP.pdf");
        }

        window.onload = fetchPegawai;
    </script>
</body>
</html>
