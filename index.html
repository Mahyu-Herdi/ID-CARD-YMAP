<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Karyawan Yayasan Muslim Aceh Peduli</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#EAE6DF">

    <script>
        if(window.location.search.includes('verify=')) {
            document.write('<style>.hide-on-verify { display: none !important; pointer-events: none !important; }</style>');
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #EAE6DF; 
            --white: #ffffff; 
            --shadow: #cfcbc4; 
            --text: #504e4a;
            --card-bg: #F2EFE8; 
            --card-shadow: #d1cdc6;
            
            --ymap-red: #EA4349;
            --ymap-blue: #267CA5;
            --ymap-blue-dark: #1b5b7a;
        }

        body { 
            font-family: 'Lexend', sans-serif; background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 30px 15px; 
            display: flex; flex-direction: column; align-items: center; 
        }

        /* CLAYMORPHISM PUFFY (Sangat empuk) */
        .glass-panel { 
            background: var(--bg); border-radius: 35px; padding: 30px 25px; 
            width: 92%; max-width: 400px; box-sizing: border-box;
            box-shadow: 12px 12px 24px var(--shadow), -12px -12px 24px var(--white), 
                        inset 3px 3px 8px rgba(255,255,255,0.8); 
            border: 1px solid rgba(255,255,255,0.4);
            margin-bottom: 30px; display: flex; flex-direction: column; align-items: center;
        }

        input, select { 
            width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 18px; 
            background: var(--bg); 
            box-shadow: inset 6px 6px 12px var(--shadow), inset -6px -6px 12px var(--white); 
            box-sizing: border-box; font-family: inherit; outline: none; color: var(--text); 
            transition: all 0.3s;
        }
        input:focus { box-shadow: inset 8px 8px 16px var(--shadow), inset -8px -8px 16px var(--white); border: 1px solid var(--ymap-blue); }

        button { 
            width: 100%; padding: 16px; margin: 15px 0 5px 0; border: none; border-radius: 22px; 
            font-family: inherit; font-weight: 600; font-size: 0.95rem;
            cursor: pointer; transition: all 0.2s ease; 
        }
        
        .btn-blue {
            background: var(--ymap-blue); color: white;
            box-shadow: 8px 8px 16px var(--shadow), -8px -8px 16px var(--white), 
                        inset 3px 3px 8px rgba(255,255,255,0.3), inset -3px -3px 8px rgba(0,0,0,0.1);
        }
        .btn-blue:hover { transform: translateY(-2px); background: var(--ymap-blue-dark); box-shadow: 10px 10px 20px var(--shadow), -10px -10px 20px var(--white), inset 3px 3px 8px rgba(255,255,255,0.4); }
        .btn-blue:active { transform: translateY(2px); box-shadow: inset 6px 6px 12px rgba(0,0,0,0.2); }

        .btn-red {
            background: var(--ymap-red); color: white;
            box-shadow: 8px 8px 16px var(--shadow), -8px -8px 16px var(--white), 
                        inset 3px 3px 8px rgba(255,255,255,0.3), inset -3px -3px 8px rgba(0,0,0,0.1);
        }
        .btn-red:hover { transform: translateY(-2px); filter: brightness(0.9); box-shadow: 10px 10px 20px var(--shadow), -10px -10px 20px var(--white), inset 3px 3px 8px rgba(255,255,255,0.4); }
        .btn-red:active { transform: translateY(2px); box-shadow: inset 6px 6px 12px rgba(0,0,0,0.2); }

        /* HEADER & LACI ANIMASI BARU */
        .header-container { 
            width: 100%; max-width: 400px; 
            display: flex; flex-direction: column; align-items: flex-start; /* Rata kiri */
            margin-bottom: 25px; position: relative; 
        }
        .app-header { 
            display: flex; flex-direction: row; align-items: center; justify-content: flex-start; 
            width: 100%; text-align: left; cursor: pointer; z-index: 5; background: var(--bg); 
            user-select: none; -webkit-tap-highlight-color: transparent; transition: opacity 0.2s;
        }
        .app-header:active { opacity: 0.7; }
        .app-header img { 
            width: 65px; object-fit: contain; margin-bottom: 0; margin-right: 15px; 
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1)); 
        }
        .app-header h2 { 
            margin: 0; color: var(--ymap-blue-dark); font-size: 1.15rem; 
            letter-spacing: 0.5px; font-weight: 700; line-height: 1.3; 
        }
        .drawer-wrapper { 
            width: 100%; display: flex; justify-content: flex-start; 
            overflow: hidden; max-height: 0; opacity: 0; transform: translateY(-20px); 
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); 
            z-index: 1; padding-left: 5px; 
        }
        .drawer-wrapper.open { 
            max-height: 80px; opacity: 1; transform: translateY(0); margin-top: 15px; 
        }
        .btn-tambah { 
            width: auto; padding: 12px 24px; font-size: 0.9rem; margin: 0; 
        }

        /* ID CARD - Presisi & Anti Pecah */
        #id-card { 
            width: 320px; height: 507px; 
            background: var(--card-bg); border-radius: 25px; 
            box-shadow: 15px 15px 30px var(--shadow), -15px -15px 30px var(--white),
                        inset 3px 3px 10px rgba(255,255,255,1); 
            border: 2px solid rgba(255,255,255,0.5);
            position: relative; display: none; 
            flex-direction: column; align-items: center; justify-content: flex-start;
            padding: 20px; padding-top: 85px; 
            box-sizing: border-box; margin: 0 auto; 
            overflow: hidden; 
            z-index: 1;
        }

        .shape-red {
            position: absolute; top: -30px; right: -30px; width: 100px; height: 100px;
            background: transparent; border-radius: 50%; z-index: -1; 
            box-shadow: 0 0 90px 70px rgba(234, 67, 73, 0.4); 
        }
        .shape-blue {
            position: absolute; bottom: -30px; left: -30px; width: 100px; height: 100px;
            background: transparent; border-radius: 50%; z-index: -1; 
            box-shadow: 0 0 90px 70px rgba(38, 124, 165, 0.4); 
        }

        img[src=""] { display: none; }
        .logo-img { position: absolute; top: 20px; left: 20px; width: 85px; object-fit: contain; z-index: 2; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1)); }
        
        .profile-img-frame { 
            width: 135px; height: 165px; margin: 0 0 15px 0; border-radius: 22px; 
            background: var(--card-bg); z-index: 2;
            box-shadow: 8px 8px 16px var(--card-shadow), -8px -8px 16px var(--white), inset 2px 2px 5px rgba(255,255,255,0.5); 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
            border: 3px solid rgba(255,255,255,0.7); 
        }
        .profile-img-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .qr-area { 
            width: 70px; height: 70px; margin: 0 0 12px 0; padding: 5px; 
            background: white; border-radius: 12px; z-index: 2;
            box-shadow: 4px 4px 10px var(--card-shadow), -4px -4px 10px var(--white); 
        }
        
        .info { text-align: center; z-index: 2; display: flex; flex-direction: column; }
        .info h3 { margin: 0; font-size: 1.25rem; color: var(--ymap-blue-dark); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;}
        .info p { margin: 0; font-size: 0.85rem; color: #555; font-weight: 600; line-height: 1.4;}
        .info .id-text { font-weight: bold; color: var(--ymap-red); font-size: 10px; margin-bottom: 4px; letter-spacing: 1px;}
        .info .alamat-text { font-size: 0.75rem; font-weight: 500; color: #666; max-width: 260px; line-height: 1.2; margin-top: 6px;}

        /* LIST & DASHBOARD */
        .emp-list { width: 92%; max-width: 400px; box-sizing: border-box;}
        .emp-card { 
            background: var(--bg); padding: 22px; margin: 20px 0; border-radius: 25px; 
            box-shadow: 10px 10px 20px var(--shadow), -10px -10px 20px var(--white); 
            display: flex; flex-direction: column; gap: 15px; border: 1px solid rgba(255,255,255,0.3);
        }
        .emp-info { border-bottom: 2px dashed #d3cec4; padding-bottom: 12px; }
        .emp-info b { color: var(--ymap-blue-dark); font-size: 1.1rem; }
        .action-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: space-between; }
        .action-group button { margin: 0; padding: 10px; width: 47%; font-size: 12px; border-radius: 15px; background: var(--bg); box-shadow: 4px 4px 8px var(--shadow), -4px -4px 8px var(--white); color: var(--text); border: none;}
        .action-group button:active { box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--white); }

        .custom-notif { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(234, 230, 223, 0.85); backdrop-filter: blur(5px); z-index: 9999; display: none; justify-content: center; align-items: center; }
        .notif-box { background: var(--bg); padding: 35px 25px; border-radius: 30px; box-shadow: 15px 15px 30px var(--shadow), -15px -15px 30px var(--white), inset 2px 2px 5px rgba(255,255,255,0.6); text-align: center; width: 85%; max-width: 300px; border: 1px solid rgba(255,255,255,0.5); }
        .btn-group-notif { display: flex; gap: 10px; margin-top: 20px; }

        .verify-icon { width: 80px; height: 80px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 40px; margin: 0 auto 20px auto; color: white; box-shadow: 8px 8px 16px var(--shadow), -8px -8px 16px var(--white), inset 2px 2px 6px rgba(255,255,255,0.3); }
        .icon-success { background: #27ae60; }
        .icon-fail { background: #e74c3c; }

        #card-action-btns { display: none; width: 92%; max-width: 320px; margin-top: 15px; flex-direction: column; gap: 10px; }

        #dashboardScreen { display: none; flex-direction: column; align-items: center; width: 100%; }
        
        .btn-logout { background: transparent; border: none; color: var(--ymap-red); font-size: 12px; box-shadow: none; padding: 5px; width: auto; margin-top: 20px; text-decoration: underline; font-weight: 600; }
        .btn-logout:active { transform: none; box-shadow: none; background: transparent; }
    </style>
</head>
<body>

    <div id="notifOverlay" class="custom-notif hide-on-verify">
        <div class="notif-box">
            <p id="notifText" style="font-weight: 600; font-size: 1.1rem; color: var(--ymap-blue-dark);"></p>
            <button onclick="tutupNotif()" class="btn-blue">Tutup</button>
        </div>
    </div>

    <div id="confirmOverlay" class="custom-notif hide-on-verify">
        <div class="notif-box">
            <p style="font-weight: 600; color: var(--ymap-red); font-size: 1.1rem;">Yakin mau hapus data pegawai ini secara permanen?</p>
            <div class="btn-group-notif">
                <button onclick="tutupConfirm()" style="background:var(--bg); color:var(--text); box-shadow: inset 4px 4px 8px var(--shadow), inset -4px -4px 8px var(--white);">Batal</button>
                <button onclick="eksekusiHapus()" class="btn-red">Ya, Hapus!</button>
            </div>
        </div>
    </div>

    <div id="verifyOverlay" class="custom-notif">
        <div class="notif-box" id="verifyContent"></div>
    </div>

    <div class="header-container hide-on-verify">
        <div class="app-header" id="appHeader" onclick="toggleDrawer()">
            <img src="logo.png" alt="Logo YMAP" onerror="this.style.display='none'">
            <h2>YAYASAN MUSLIM<br>ACEH PEDULI</h2>
        </div>
        <div class="drawer-wrapper" id="drawerButton">
            <button id="btnBukaForm" class="btn-blue btn-tambah" onclick="bukaForm()">+ Tambah Pegawai</button>
        </div>
    </div>

    <div id="loginScreen" class="glass-panel hide-on-verify" style="margin-top: 10px;">
        <h2 style="color: var(--ymap-blue-dark); margin-bottom: 20px; text-align: center;">Login Admin</h2>
        <input type="text" id="loginUsername" placeholder="Username">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="prosesLogin()" class="btn-blue" style="margin-top: 25px;">Masuk Aplikasi</button>
    </div>

    <div id="dashboardScreen" class="hide-on-verify">
        
        <div class="glass-panel" id="adminPanel" style="display: none;">
            <h2 id="formTitle" style="text-align: center; margin-bottom: 20px; color: var(--ymap-blue-dark);">Registrasi Pegawai</h2>
            <form id="ymapForm" style="width: 100%;">
                <input type="text" id="nama" placeholder="Nama Lengkap" required>
                <input type="text" id="jabatan" placeholder="Jabatan" required>
                <input type="text" id="no_hp" placeholder="Nomor HP / WA" required>
                <input type="text" id="alamat" placeholder="Alamat Sesuai KTP" required>
                <p style="font-size: 12px; margin: 15px 0 5px 10px; opacity: 0.7; font-weight: 600;">Upload Foto Profil:</p>
                <input type="file" id="foto" accept="image/*" required>
                <p style="font-size: 12px; margin: 15px 0 5px 10px; opacity: 0.7; font-weight: 600;">Upload Foto KTP:</p>
                <input type="file" id="ktp" accept="image/*" required>
                
                <button type="button" onclick="simpanData()" id="btnSubmit" class="btn-blue" style="margin-top: 20px;">Simpan Data</button>
                <button type="button" onclick="tutupForm()" class="btn-red" style="margin-top: 5px;">Batal</button>
            </form>
        </div>

        <div id="id-card">
            <div class="shape-red"></div>
            <div class="shape-blue"></div>
            <img src="logo.png" id="cardLogo" class="logo-img" onerror="this.style.display='none'"> 
            
            <div class="profile-img-frame">
                <img src="" id="cardPhoto">
            </div>
            <div id="cardQr" class="qr-area"></div>
            <div class="info">
                <p id="cardId" class="id-text"></p>
                <h3 id="cardNama"></h3>
                <p id="cardJabatan"></p>
                <p id="cardHp"></p>
                <p id="cardAlamat" class="alamat-text"></p>
            </div>
        </div>
        
        <div id="card-action-btns">
            <button id="btnDownload" class="btn-blue" style="margin: 0;" onclick="downloadPDF()">Download ID Card (PDF)</button>
            <button onclick="tutupCard()" class="btn-red" style="margin: 0;">Tutup Preview Card</button>
        </div>

        <div class="emp-list" id="areaDaftarPegawai">
            <input type="text" id="inputCari" placeholder="🔍 Cari nama atau jabatan..." onkeyup="cariPegawai()" style="margin-bottom: 20px;">
            <div id="empListArea"></div>
        </div>

        <button onclick="prosesLogout()" class="btn-logout">Logout Admin</button>

    </div> 

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('Gagal Offline', err));
            });
        }

        const API_URL = "https://script.google.com/macros/s/AKfycbwXt9J06AExtcpj9eYd43YrBfIVMMxz3qYXrdJ9hXFNpOEtVOkKnHJl5AA2pcYJ0rmPBw/exec"; 
        
        let globalData = [];
        let editModeId = null; 
        let hapusModeId = null;

        function tampilNotif(pesan) { document.getElementById('notifText').innerText = pesan; document.getElementById('notifOverlay').style.display = 'flex'; }
        function tutupNotif() { document.getElementById('notifOverlay').style.display = 'none'; }
        function bukaConfirm(id) { hapusModeId = id; document.getElementById('confirmOverlay').style.display = 'flex'; }
        function tutupConfirm() { hapusModeId = null; document.getElementById('confirmOverlay').style.display = 'none'; }

        // --- FUNGSI TOGGLE LACI ANIMASI ---
        function toggleDrawer() {
            // Hanya bisa buka laci kalau sudah login (layar dashboard aktif)
            if (document.getElementById('dashboardScreen').style.display === 'flex') {
                const drawer = document.getElementById('drawerButton');
                drawer.classList.toggle('open');
            }
        }

        function cekLogin() {
            if(window.location.search.includes('verify=')) {
                fetchPegawai(); 
                return;
            }

            const isLogin = localStorage.getItem('ymap_admin_login');
            if(isLogin === 'true') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardScreen').style.display = 'flex';
                fetchPegawai(); 
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('dashboardScreen').style.display = 'none';
                document.getElementById('drawerButton').classList.remove('open'); // Pastikan laci tertutup saat logout
            }
        }

        function prosesLogin() {
            const u = document.getElementById('loginUsername').value;
            const p = document.getElementById('loginPassword').value;
            if(u === 'mahyuherdi09' && p === 'M24yu@mhy') {
                localStorage.setItem('ymap_admin_login', 'true');
                document.getElementById('loginUsername').value = "";
                document.getElementById('loginPassword').value = "";
                cekLogin();
            } else {
                tampilNotif("Username atau Password salah!");
            }
        }

        function prosesLogout() {
            localStorage.removeItem('ymap_admin_login');
            window.location.reload();
        }

        function bukaForm() {
            document.getElementById('adminPanel').style.display = 'flex';
            document.getElementById('btnBukaForm').style.display = 'none';
            document.getElementById('drawerButton').classList.remove('open'); // Tutup laci otomatis
            document.getElementById('ymapForm').reset();
            editModeId = null;
            document.getElementById('formTitle').innerText = "Registrasi Pegawai Baru";
            document.getElementById('foto').required = true;
            document.getElementById('ktp').required = true;
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        function tutupForm() {
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('btnBukaForm').style.display = 'block'; // Kembalikan tombol di laci
            document.getElementById('ymapForm').reset();
            editModeId = null;
        }

        async function fetchPegawai() {
            try {
                const res = await fetch(API_URL);
                globalData = await res.json();
                
                const urlParams = new URLSearchParams(window.location.search);
                const verifyId = urlParams.get('verify'); 

                if(verifyId) {
                    const emp = globalData.find(e => e.fileId === verifyId);
                    document.getElementById('verifyOverlay').style.display = 'flex';
                    
                    if(emp) {
                        document.getElementById('verifyContent').innerHTML = `
                            <div class="verify-icon icon-success">✓</div>
                            <h2 style="color:#27ae60; margin-bottom: 5px;">TERVERIFIKASI</h2>
                            <p style="opacity:0.8; font-size:0.9rem; margin-top: 0;">ID Card ini ASLI dan terdaftar resmi di database Yayasan Muslim Aceh Peduli.</p>
                            <hr style="border:none; border-top:2px dashed #cfcbc4; margin:20px 0;">
                            <h3 style="color:var(--ymap-blue-dark); margin:5px 0; font-size: 1.4rem;">${emp.nama.toUpperCase()}</h3>
                            <p style="margin:0; opacity:0.8; font-weight: 600;">${emp.jabatan}</p>
                            <p style="margin:5px 0 0 0; color:var(--ymap-red); font-weight:bold; font-size: 0.8rem;">ID: ${emp.fileId.substring(0, 8).toUpperCase()}</p>
                        `;
                    } else {
                        document.getElementById('verifyContent').innerHTML = `
                            <div class="verify-icon icon-fail">✗</div>
                            <h2 style="color:var(--ymap-red); margin-bottom: 5px;">TIDAK VALID</h2>
                            <p style="opacity:0.8; font-size:0.9rem; margin-top: 0;">Data ID Card tidak ditemukan atau tidak terdaftar di sistem kami.</p>
                        `;
                    }
                    return; 
                }
                
                if(localStorage.getItem('ymap_admin_login') === 'true') {
                    renderList(globalData);
                }
            } catch(e) { 
                if(localStorage.getItem('ymap_admin_login') === 'true'){
                    tampilNotif("Gagal memuat daftar pegawai."); 
                }
            }
        }

        function renderList(dataArray) {
            const container = document.getElementById('empListArea');
            container.innerHTML = ''; 
            
            if (dataArray.length === 0) {
                container.innerHTML = '<p style="text-align:center; opacity:0.6; margin-top:20px;">Pegawai tidak ditemukan.</p>';
                return;
            }

            dataArray.forEach(emp => {
                container.innerHTML += `
                    <div class="emp-card">
                        <div class="emp-info">
                            <b>${emp.nama}</b><br>
                            <small style="opacity: 0.8; color: var(--text);">${emp.jabatan}</small>
                        </div>
                        <div class="action-group">
                            <button onclick="lihatCard('${emp.fileId}')" style="color: var(--ymap-blue);">Lihat Card</button>
                            <button onclick="window.open('https://drive.google.com/uc?id=${emp.id_ktp_file}')" style="color: #8e44ad;">Lihat KTP</button>
                            <button onclick="siapkanEdit('${emp.fileId}')" style="color: #d35400;">Edit Data</button>
                            <button onclick="bukaConfirm('${emp.fileId}')" style="color: var(--ymap-red);">Hapus</button>
                        </div>
                    </div>`;
            });
        }

        function cariPegawai() {
            const keyword = document.getElementById('inputCari').value.toLowerCase();
            const filteredData = globalData.filter(emp => 
                emp.nama.toLowerCase().includes(keyword) || 
                emp.jabatan.toLowerCase().includes(keyword)
            );
            renderList(filteredData);
        }

        function siapkanEdit(id) {
            const emp = globalData.find(e => e.fileId === id);
            if(!emp) return;
            
            document.getElementById('adminPanel').style.display = 'flex';
            document.getElementById('btnBukaForm').style.display = 'none';
            document.getElementById('drawerButton').classList.remove('open');
            document.getElementById('formTitle').innerText = "Update Data Pegawai";

            document.getElementById('nama').value = emp.nama;
            document.getElementById('jabatan').value = emp.jabatan;
            document.getElementById('no_hp').value = emp.no_hp;
            document.getElementById('alamat').value = emp.alamat;
            
            editModeId = id; 
            document.getElementById('foto').required = false; 
            document.getElementById('ktp').required = false;
            
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        async function eksekusiHapus() {
            if(!hapusModeId) return;
            const idYangDihapus = hapusModeId; 
            tutupConfirm(); 
            tampilNotif("Sedang menghapus data...");
            
            try {
                fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "delete", fileId: idYangDihapus }) 
                });
                
                globalData = globalData.filter(emp => emp.fileId !== idYangDihapus);
                renderList(globalData);
                
                tutupNotif(); 
                tampilNotif("Data berhasil dihapus!");
                document.getElementById('inputCari').value = ""; 
                hapusModeId = null;
            } catch(e) { 
                tampilNotif("Gagal menghapus data. Periksa koneksi."); 
            }
        }

        async function simpanData() {
            const btn = document.getElementById('btnSubmit');
            const fotoFile = document.getElementById('foto').files[0];
            const ktpFile = document.getElementById('ktp').files[0];
            if(!editModeId && (!fotoFile || !ktpFile || !document.getElementById('nama').value)) { return tampilNotif("Lengkapi semua data & foto untuk pegawai baru!"); }
            btn.innerText = "Diproses..."; btn.disabled = true;

            const toBase64 = file => new Promise((resolve) => {
                if(!file) return resolve(null);
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
            });

            let payload = {
                action: editModeId ? "edit" : "add", fileId: editModeId, 
                formData: { nama: document.getElementById('nama').value, jabatan: document.getElementById('jabatan').value, no_hp: document.getElementById('no_hp').value, alamat: document.getElementById('alamat').value }
            };

            if(!editModeId) {
                payload.photo = { blob: await toBase64(fotoFile), mimeType: fotoFile.type };
                payload.ktp = { blob: await toBase64(ktpFile), mimeType: ktpFile.type };
            } else {
                const empLama = globalData.find(e => e.fileId === editModeId);
                payload.formData.id_ktp_file = empLama.id_ktp_file; 
            }

            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                tampilNotif(editModeId ? "Data berhasil diupdate!" : "Pegawai baru didaftarkan!");
                
                tutupForm(); 
                document.getElementById('inputCari').value = ""; 
                fetchPegawai(); 
            } catch(e) { tampilNotif("Terjadi kesalahan sistem."); }
            
            btn.innerText = "Simpan Data"; 
            btn.disabled = false;
        }

        async function lihatCard(id) {
            const emp = globalData.find(e => e.fileId === id);
            if(!emp) return;

            document.getElementById('cardNama').innerText = emp.nama;
            document.getElementById('cardJabatan').innerText = emp.jabatan;
            document.getElementById('cardHp').innerText = emp.no_hp;
            document.getElementById('cardAlamat').innerText = emp.alamat; 
            document.getElementById('cardId').innerText = "ID: " + emp.fileId.substring(0, 8).toUpperCase();
            document.getElementById('cardLogo').style.display = 'block';

            const photoEl = document.getElementById('cardPhoto');
            photoEl.style.display = 'block';
            photoEl.src = emp.photoUrl; 

            const urlUtama = window.location.href.split('?')[0]; 
            const linkVerifikasi = `${urlUtama}?verify=${emp.fileId}`;
            document.getElementById('cardQr').innerHTML = "";
            
            new QRCode(document.getElementById('cardQr'), { 
                text: linkVerifikasi, 
                width: 70, 
                height: 70,
                correctLevel : QRCode.CorrectLevel.H 
            });

            document.getElementById('id-card').style.display = 'flex';
            
            const btnContainer = document.getElementById('card-action-btns');
            const btnDl = document.getElementById('btnDownload');

            if(!window.location.search.includes('verify=')) {
                btnContainer.style.display = 'flex';
                btnDl.innerText = "Memuat Kualitas HD...";
                btnDl.disabled = true;
                btnDl.style.background = "#95a5a6";
            }

            document.getElementById('id-card').scrollIntoView({ behavior: 'smooth' });

            try {
                const resGambar = await fetch(API_URL + "?action=getImage&id=" + emp.fileId);
                const base64Murni = await resGambar.text();
                if(base64Murni.startsWith('data:image')) {
                    photoEl.src = base64Murni; 
                }
            } catch(e) { console.log("Gambar HD gagal dimuat"); }

            if(!window.location.search.includes('verify=')) {
                btnDl.innerText = "Download ID Card (PDF)";
                btnDl.disabled = false;
                btnDl.style.background = "var(--ymap-blue)"; 
            }
        }

        function tutupCard() {
            document.getElementById('id-card').style.display = 'none';
            document.getElementById('card-action-btns').style.display = 'none';
            const areaDaftar = document.getElementById('areaDaftarPegawai');
            areaDaftar.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        async function downloadPDF() {
            tampilNotif("Menyiapkan PDF Kualitas HD...");
            const card = document.getElementById('id-card');
            
            window.scrollTo(0, 0); 
            
            try {
                const canvas = await html2canvas(card, { 
                    scale: 4, 
                    useCORS: true, 
                    allowTaint: false,
                    backgroundColor: "#F2EFE8" 
                });
                
                const imgData = canvas.toDataURL('image/png', 1.0);
                const { jsPDF } = window.jspdf;
                
                const pdf = new jsPDF({
                    orientation: 'portrait',
                    unit: 'mm',
                    format: [54, 85.6]
                });
                
                pdf.addImage(imgData, 'PNG', 0, 0, 54, 85.6);
                pdf.save(`ID_CARD_${document.getElementById('cardNama').innerText}.pdf`);
                tutupNotif();
            } catch (err) { tampilNotif("Gagal membuat PDF. Coba lagi."); }
        }

        window.onload = cekLogin;
    </script>
</body>
</html>
