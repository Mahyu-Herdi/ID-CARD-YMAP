<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Karyawan Yayasan Muslim Aceh Peduli</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#EAE6DF">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #EAE6DF; 
            --white: #ffffff; 
            --shadow: #c5c1ba; 
            --text: #504e4a;
            --card-bg: #F2EFE8; 
            --card-shadow: #d1cdc6;
            --ymap-red: #EA4349;
            --ymap-blue: #267CA5;
        }

        body { 
            font-family: 'Lexend', sans-serif; background-color: var(--bg); color: var(--text); 
            margin: 0; padding: 30px 15px; 
            display: flex; flex-direction: column; align-items: center; 
        }

        /* --- CLAYMORPHISM DITINGKATKAN --- */
        .glass-panel { 
            background: var(--bg); border-radius: 35px; padding: 25px; 
            width: 92%; max-width: 400px; box-sizing: border-box;
            box-shadow: 20px 20px 60px var(--shadow), -20px -20px 60px var(--white), 
                        inset 4px 4px 10px rgba(255,255,255,0.9); /* Inset dipertebal biar empuk */
            border: 1px solid rgba(255,255,255,0.5);
            margin-bottom: 30px; 
        }

        input, select { 
            width: 100%; padding: 16px; margin: 10px 0; border: none; border-radius: 18px; 
            background: var(--bg); 
            box-shadow: inset 8px 8px 16px var(--shadow), inset -8px -8px 16px var(--white); 
            box-sizing: border-box; font-family: inherit; outline: none; color: var(--text); 
            transition: all 0.3s;
        }
        input:focus { box-shadow: inset 10px 10px 20px var(--shadow), inset -10px -10px 20px var(--white); }

        button { 
            width: 100%; padding: 18px; margin: 15px 0 5px 0; border: none; border-radius: 22px; 
            background: var(--bg); color: var(--text); font-family: inherit; font-weight: 600; font-size: 1rem;
            cursor: pointer; transition: all 0.2s ease; 
            box-shadow: 12px 12px 24px var(--shadow), -12px -12px 24px var(--white), 
                        inset 4px 4px 8px rgba(255,255,255,0.9), inset -4px -4px 8px rgba(0,0,0,0.05); /* Clay lebih terasa */
            border: 1px solid rgba(255,255,255,0.4);
        }
        button:hover { transform: translateY(-3px); box-shadow: 14px 14px 28px var(--shadow), -14px -14px 28px var(--white), inset 4px 4px 8px rgba(255,255,255,0.9); }
        button:active { transform: translateY(2px); box-shadow: inset 8px 8px 16px var(--shadow), inset -8px -8px 16px var(--white); border: none; }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: inset 6px 6px 12px var(--shadow), inset -6px -6px 12px var(--white); }

        /* --- ID CARD LAYOUT CENTER PRESISI --- */
        #id-card { 
            width: 320px; height: 500px; background: var(--card-bg); border-radius: 25px; 
            box-shadow: 20px 20px 50px var(--shadow), -20px -20px 50px var(--white),
                        inset 4px 4px 15px rgba(255,255,255,1); /* Makin empuk */
            border: 2px solid rgba(255,255,255,0.7);
            position: relative; display: none; 
            flex-direction: column; align-items: center; justify-content: center; /* Bikin konten presisi di tengah */
            padding: 20px; padding-top: 40px; box-sizing: border-box; margin: 0 auto; 
            overflow: hidden; 
            z-index: 1;
        }

        /* Seni Gelombang Dipertebal Warnanya */
        .shape-red {
            position: absolute; top: -60px; right: -60px; width: 260px; height: 260px;
            background: var(--ymap-red); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            opacity: 0.35; /* Ditebalin dari 0.12 */
            z-index: -1; filter: blur(25px); /* Biar tetep nyatu sama BG */
        }
        .shape-blue {
            position: absolute; bottom: -70px; left: -70px; width: 260px; height: 260px;
            background: var(--ymap-blue); border-radius: 60% 40% 30% 70% / 50% 40% 50% 60%;
            opacity: 0.35; /* Ditebalin dari 0.12 */
            z-index: -1; filter: blur(25px);
        }

        img[src=""] { display: none; }
        
        /* Posisi Logo di Card */
        .logo-img { position: absolute; top: 20px; left: 20px; width: 85px; object-fit: contain; z-index: 2; filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.15)); }
        
        /* Frame Foto */
        .profile-img-frame { 
            width: 140px; height: 170px; margin-bottom: 15px; border-radius: 22px; 
            background: var(--card-bg); z-index: 2;
            box-shadow: 12px 12px 24px var(--card-shadow), -12px -12px 24px var(--white), inset 3px 3px 8px rgba(255,255,255,0.8); 
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
            border: 4px solid rgba(255,255,255,0.9); /* Bingkai foto lebih tebal */
        }
        .profile-img-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Area QR */
        .qr-area { 
            width: 70px; height: 70px; margin: 0 0 15px 0; padding: 5px; 
            background: white; border-radius: 12px; z-index: 2;
            box-shadow: 6px 6px 12px var(--card-shadow), -6px -6px 12px var(--white); 
        }
        
        /* Info Teks */
        .info { text-align: center; z-index: 2; display: flex; flex-direction: column; gap: 4px;}
        .info h3 { margin: 0; font-size: 1.25rem; color: #2d3436; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;}
        .info p { margin: 0; font-size: 0.9rem; color: #555; font-weight: 600; }
        .info .id-text { font-weight: bold; color: #888; font-size: 10px; margin-bottom: 2px;}
        .info .alamat-text { font-size: 0.8rem; font-weight: 500; color: #666; max-width: 260px; line-height: 1.2; margin-top: 5px;}

        /* --- SISA STYLE SAMA --- */
        .emp-list { width: 92%; max-width: 400px; box-sizing: border-box;}
        .emp-card { 
            background: var(--bg); padding: 22px; margin: 20px 0; border-radius: 25px; 
            box-shadow: 12px 12px 24px var(--shadow), -12px -12px 24px var(--white); 
            display: flex; flex-direction: column; gap: 15px; border: 1px solid rgba(255,255,255,0.3);
        }
        .emp-info { border-bottom: 2px dashed #d3cec4; padding-bottom: 12px; }
        .action-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: space-between; }
        .action-group button { margin: 0; padding: 12px; width: 47%; font-size: 12px; border-radius: 15px; }

        .custom-notif { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(234, 230, 223, 0.85); backdrop-filter: blur(8px); z-index: 9999; display: none; justify-content: center; align-items: center; }
        .notif-box { background: var(--bg); padding: 35px 25px; border-radius: 35px; box-shadow: 20px 20px 60px var(--shadow), -20px -20px 60px var(--white), inset 2px 2px 5px rgba(255,255,255,0.6); text-align: center; width: 85%; max-width: 320px; border: 1px solid rgba(255,255,255,0.5); }
        .btn-group-notif { display: flex; gap: 10px; margin-top: 20px; }

        .verify-icon { width: 80px; height: 80px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 40px; margin: 0 auto 20px auto; color: white; box-shadow: 10px 10px 20px var(--shadow), -10px -10px 20px var(--white), inset 3px 3px 6px rgba(255,255,255,0.5); }
        .icon-success { background: #27ae60; }
        .icon-fail { background: #e74c3c; }

        #card-action-btns { display: none; width: 92%; max-width: 320px; margin-top: 15px; flex-direction: column; gap: 10px; }

        .app-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; width: 100%; text-align: center; }
        .app-header img { width: 140px; object-fit: contain; margin-bottom: 12px; filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.1)); }
        .app-header h2 { margin: 0; color: #2d3436; font-size: 1.25rem; letter-spacing: 0.5px; font-weight: 700; line-height: 1.4; }

        .btn-tambah { width: auto; min-width: 200px; padding: 14px 28px; background: #2980b9; color: white; margin-bottom: 25px; font-size: 0.95rem; border-radius: 20px; }
    </style>
</head>
<body>

    <div id="notifOverlay" class="custom-notif">
        <div class="notif-box">
            <p id="notifText" style="font-weight: 600; font-size: 1.1rem;"></p>
            <button onclick="tutupNotif()">Tutup</button>
        </div>
    </div>

    <div id="confirmOverlay" class="custom-notif">
        <div class="notif-box">
            <p style="font-weight: 600; color: #c0392b; font-size: 1.1rem;">Yakin mau hapus data pegawai ini secara permanen?</p>
            <div class="btn-group-notif">
                <button onclick="tutupConfirm()" style="color: #504e4a;">Batal</button>
                <button onclick="eksekusiHapus()" style="color: #c0392b;">Ya, Hapus!</button>
            </div>
        </div>
    </div>

    <div id="verifyOverlay" class="custom-notif">
        <div class="notif-box" id="verifyContent"></div>
    </div>

    <div class="app-header" id="appHeader">
        <img src="logo.png" alt="Logo YMAP" onerror="this.style.display='none'">
        <h2>YAYASAN MUSLIM<br>ACEH PEDULI</h2>
    </div>

    <button id="btnBukaForm" class="btn-tambah" onclick="bukaForm()">+ Tambah Pegawai</button>

    <div class="glass-panel" id="adminPanel" style="display: none;">
        <h2 id="formTitle" style="text-align: center; margin-bottom: 25px; color: #2d3436;">Registrasi Pegawai</h2>
        <form id="ymapForm">
            <input type="text" id="nama" placeholder="Nama Lengkap" required>
            <input type="text" id="jabatan" placeholder="Jabatan" required>
            <input type="text" id="no_hp" placeholder="Nomor HP / WA" required>
            <input type="text" id="alamat" placeholder="Alamat Sesuai KTP" required>
            <p style="font-size: 12px; margin: 15px 0 5px 10px; opacity: 0.7; font-weight: 600;">Upload Foto Profil:</p>
            <input type="file" id="foto" accept="image/*" required>
            <p style="font-size: 12px; margin: 15px 0 5px 10px; opacity: 0.7; font-weight: 600;">Upload Foto KTP:</p>
            <input type="file" id="ktp" accept="image/*" required>
            
            <button type="button" onclick="simpanData()" id="btnSubmit" style="background: #27ae60; color: white;">Simpan Data</button>
            <button type="button" onclick="tutupForm()" style="background: #e74c3c; color: white; margin-top: 5px;">Batal</button>
        </form>
    </div>

    <div id="id-card">
        <div class="shape-red"></div>
        <div class="shape-blue"></div>
        <img src="logo.png" id="cardLogo" class="logo-img" onerror="this.style.display='none'"> 
        
        <div class="profile-img-frame">
            <img src="" id="cardPhoto">
        </div>
        <div id="cardQr" class="qr-area"></div>
        <div class="info">
            <p id="cardId" class="id-text"></p>
            <h3 id="cardNama"></h3>
            <p id="cardJabatan"></p>
            <p id="cardHp"></p>
            <p id="cardAlamat" class="alamat-text"></p>
        </div>
    </div>
    
    <div id="card-action-btns">
        <button id="btnDownload" style="background: #27ae60; color: white; margin: 0;" onclick="downloadPDF()">Download ID Card (PDF)</button>
        <button onclick="tutupCard()" style="background: #e74c3c; color: white; margin: 0;">Tutup Preview Card</button>
    </div>

    <div class="emp-list" id="areaDaftarPegawai">
        <input type="text" id="inputCari" placeholder="🔍 Cari nama atau jabatan..." onkeyup="cariPegawai()" style="margin-bottom: 20px;">
        <div id="empListArea"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('Gagal Offline', err));
            });
        }

        const API_URL = "https://script.google.com/macros/s/AKfycbwXt9J06AExtcpj9eYd43YrBfIVMMxz3qYXrdJ9hXFNpOEtVOkKnHJl5AA2pcYJ0rmPBw/exec"; 
        
        let globalData = [];
        let editModeId = null; 
        let hapusModeId = null;

        function tampilNotif(pesan) { document.getElementById('notifText').innerText = pesan; document.getElementById('notifOverlay').style.display = 'flex'; }
        function tutupNotif() { document.getElementById('notifOverlay').style.display = 'none'; }
        function bukaConfirm(id) { hapusModeId = id; document.getElementById('confirmOverlay').style.display = 'flex'; }
        function tutupConfirm() { hapusModeId = null; document.getElementById('confirmOverlay').style.display = 'none'; }

        function bukaForm() {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('btnBukaForm').style.display = 'none';
            document.getElementById('ymapForm').reset();
            editModeId = null;
            document.getElementById('formTitle').innerText = "Registrasi Pegawai Baru";
            document.getElementById('foto').required = true;
            document.getElementById('ktp').required = true;
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        function tutupForm() {
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('btnBukaForm').style.display = 'block';
            document.getElementById('ymapForm').reset();
            editModeId = null;
        }

        async function fetchPegawai() {
            try {
                const res = await fetch(API_URL);
                globalData = await res.json();
                
                const urlParams = new URLSearchParams(window.location.search);
                const verifyId = urlParams.get('verify'); 

                if(verifyId) {
                    document.getElementById('appHeader').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'none';
                    document.getElementById('btnBukaForm').style.display = 'none';
                    document.getElementById('areaDaftarPegawai').style.display = 'none';
                    
                    const emp = globalData.find(e => e.fileId === verifyId);
                    document.getElementById('verifyOverlay').style.display = 'flex';
                    
                    if(emp) {
                        document.getElementById('verifyContent').innerHTML = `
                            <div class="verify-icon icon-success">✓</div>
                            <h2 style="color:#27ae60; margin-bottom: 5px;">TERVERIFIKASI</h2>
                            <p style="opacity:0.8; font-size:0.9rem; margin-top: 0;">ID Card ini ASLI dan terdaftar resmi di database Yayasan Muslim Aceh Peduli.</p>
                            <hr style="border:none; border-top:2px dashed #cfcbc4; margin:20px 0;">
                            <h3 style="color:#2d3436; margin:5px 0; font-size: 1.4rem;">${emp.nama.toUpperCase()}</h3>
                            <p style="margin:0; opacity:0.8; font-weight: 600;">${emp.jabatan}</p>
                            <p style="margin:5px 0 0 0; opacity:0.6; font-size: 0.8rem;">ID: ${emp.fileId.substring(0, 8).toUpperCase()}</p>
                        `;
                    } else {
                        document.getElementById('verifyContent').innerHTML = `
                            <div class="verify-icon icon-fail">✗</div>
                            <h2 style="color:#e74c3c; margin-bottom: 5px;">TIDAK VALID</h2>
                            <p style="opacity:0.8; font-size:0.9rem; margin-top: 0;">Data ID Card tidak ditemukan atau tidak terdaftar di sistem kami.</p>
                        `;
                    }
                    return; 
                }
                renderList(globalData);
            } catch(e) { tampilNotif("Gagal memuat daftar pegawai."); }
        }

        function renderList(dataArray) {
            const container = document.getElementById('empListArea');
            container.innerHTML = ''; 
            
            if (dataArray.length === 0) {
                container.innerHTML = '<p style="text-align:center; opacity:0.6; margin-top:20px;">Pegawai tidak ditemukan.</p>';
                return;
            }

            dataArray.forEach(emp => {
                container.innerHTML += `
                    <div class="emp-card">
                        <div class="emp-info">
                            <b style="font-size: 1.1rem; color: #2d3436;">${emp.nama}</b><br>
                            <small style="opacity: 0.8;">${emp.jabatan}</small>
                        </div>
                        <div class="action-group">
                            <button onclick="lihatCard('${emp.fileId}')" style="color: #2980b9;">Lihat Card</button>
                            <button onclick="window.open('https://drive.google.com/uc?id=${emp.id_ktp_file}')" style="color: #8e44ad;">Lihat KTP</button>
                            <button onclick="siapkanEdit('${emp.fileId}')" style="color: #d35400;">Edit Data</button>
                            <button onclick="bukaConfirm('${emp.fileId}')" style="color: #c0392b;">Hapus</button>
                        </div>
                    </div>`;
            });
        }

        function cariPegawai() {
            const keyword = document.getElementById('inputCari').value.toLowerCase();
            const filteredData = globalData.filter(emp => 
                emp.nama.toLowerCase().includes(keyword) || 
                emp.jabatan.toLowerCase().includes(keyword)
            );
            renderList(filteredData);
        }

        function siapkanEdit(id) {
            const emp = globalData.find(e => e.fileId === id);
            if(!emp) return;
            
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('btnBukaForm').style.display = 'none';
            document.getElementById('formTitle').innerText = "Update Data Pegawai";

            document.getElementById('nama').value = emp.nama;
            document.getElementById('jabatan').value = emp.jabatan;
            document.getElementById('no_hp').value = emp.no_hp;
            document.getElementById('alamat').value = emp.alamat;
            
            editModeId = id; 
            document.getElementById('foto').required = false; 
            document.getElementById('ktp').required = false;
            
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        async function eksekusiHapus() {
            if(!hapusModeId) return;
            const idYangDihapus = hapusModeId; 
            tutupConfirm(); 
            tampilNotif("Sedang menghapus data...");
            
            try {
                fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "delete", fileId: idYangDihapus }) 
                });
                
                globalData = globalData.filter(emp => emp.fileId !== idYangDihapus);
                renderList(globalData);
                
                tutupNotif(); 
                tampilNotif("Data berhasil dihapus!");
                document.getElementById('inputCari').value = ""; 
                hapusModeId = null;
            } catch(e) { 
                tampilNotif("Gagal menghapus data. Periksa koneksi."); 
            }
        }

        async function simpanData() {
            const btn = document.getElementById('btnSubmit');
            const fotoFile = document.getElementById('foto').files[0];
            const ktpFile = document.getElementById('ktp').files[0];
            if(!editModeId && (!fotoFile || !ktpFile || !document.getElementById('nama').value)) { return tampilNotif("Lengkapi semua data & foto untuk pegawai baru!"); }
            btn.innerText = "Diproses..."; btn.disabled = true;

            const toBase64 = file => new Promise((resolve) => {
                if(!file) return resolve(null);
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
            });

            let payload = {
                action: editModeId ? "edit" : "add", fileId: editModeId, 
                formData: { nama: document.getElementById('nama').value, jabatan: document.getElementById('jabatan').value, no_hp: document.getElementById('no_hp').value, alamat: document.getElementById('alamat').value }
            };

            if(!editModeId) {
                payload.photo = { blob: await toBase64(fotoFile), mimeType: fotoFile.type };
                payload.ktp = { blob: await toBase64(ktpFile), mimeType: ktpFile.type };
            } else {
                const empLama = globalData.find(e => e.fileId === editModeId);
                payload.formData.id_ktp_file = empLama.id_ktp_file; 
            }

            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                tampilNotif(editModeId ? "Data berhasil diupdate!" : "Pegawai baru didaftarkan!");
                
                tutupForm(); 
                document.getElementById('inputCari').value = ""; 
                fetchPegawai(); 
            } catch(e) { tampilNotif("Terjadi kesalahan sistem."); }
            
            btn.innerText = "Simpan Data"; 
            btn.disabled = false;
        }

        async function lihatCard(id) {
            const emp = globalData.find(e => e.fileId === id);
            if(!emp) return;

            document.getElementById('cardNama').innerText = emp.nama;
            document.getElementById('cardJabatan').innerText = emp.jabatan;
            document.getElementById('cardHp').innerText = emp.no_hp;
            document.getElementById('cardAlamat').innerText = emp.alamat; // Alamat masuk sini
            document.getElementById('cardId').innerText = "ID: " + emp.fileId.substring(0, 8).toUpperCase();
            document.getElementById('cardLogo').style.display = 'block';

            const photoEl = document.getElementById('cardPhoto');
            photoEl.style.display = 'block';
            photoEl.src = emp.photoUrl; 

            const urlUtama = window.location.href.split('?')[0]; 
            const linkVerifikasi = `${urlUtama}?verify=${emp.fileId}`;
            document.getElementById('cardQr').innerHTML = "";
            new QRCode(document.getElementById('cardQr'), { text: linkVerifikasi, width: 65, height: 65 });

            document.getElementById('id-card').style.display = 'flex';
            
            const btnContainer = document.getElementById('card-action-btns');
            const btnDl = document.getElementById('btnDownload');

            if(!window.location.search.includes('verify=')) {
                btnContainer.style.display = 'flex';
                btnDl.innerText = "Memuat Kualitas HD... Sabar Ya";
                btnDl.disabled = true;
                btnDl.style.background = "#95a5a6";
            }

            document.getElementById('id-card').scrollIntoView({ behavior: 'smooth' });

            try {
                const resGambar = await fetch(API_URL + "?action=getImage&id=" + emp.fileId);
                const base64Murni = await resGambar.text();
                if(base64Murni.startsWith('data:image')) {
                    photoEl.src = base64Murni; 
                }
            } catch(e) { console.log("Gambar HD gagal dimuat"); }

            if(!window.location.search.includes('verify=')) {
                btnDl.innerText = "Download ID Card (PDF)";
                btnDl.disabled = false;
                btnDl.style.background = "#27ae60";
            }
        }

        function tutupCard() {
            document.getElementById('id-card').style.display = 'none';
            document.getElementById('card-action-btns').style.display = 'none';
            const areaDaftar = document.getElementById('areaDaftarPegawai');
            areaDaftar.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        async function downloadPDF() {
            tampilNotif("Menyiapkan PDF...");
            const card = document.getElementById('id-card');
            
            try {
                const canvas = await html2canvas(card, { 
                    scale: 3, 
                    useCORS: true, 
                    allowTaint: false,
                    backgroundColor: "#F2EFE8" 
                });
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', [85.6, 54]); 
                pdf.addImage(imgData, 'PNG', 0, 0, 54, 85.6);
                pdf.save(`ID_CARD_${document.getElementById('cardNama').innerText}.pdf`);
                tutupNotif();
            } catch (err) { tampilNotif("Gagal membuat PDF. Coba lagi."); }
        }

        window.onload = fetchPegawai;
