<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMAP Enterprise ID</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="theme-color" content="#EAE6DF">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #EAE6DF; --white: #ffffff; --shadow: #c5c1ba; --text: #504e4a;
            --card-bg: #F2EFE8; --card-shadow: #cfcbc4;
        }

        body { font-family: 'Lexend', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .glass-panel { background: var(--bg); border-radius: 35px; padding: 30px; width: 100%; max-width: 420px; box-shadow: 20px 20px 60px var(--shadow), -20px -20px 60px var(--white); margin-bottom: 30px; }

        input, select { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 18px; background: var(--bg); box-shadow: inset 6px 6px 12px var(--shadow), inset -6px -6px 12px var(--white); box-sizing: border-box; font-family: inherit; outline: none; color: var(--text); }
        input:focus { box-shadow: inset 8px 8px 16px var(--shadow), inset -8px -8px 16px var(--white); }

        button { width: 100%; padding: 16px; margin: 15px 0 5px 0; border: none; border-radius: 20px; background: var(--bg); color: var(--text); font-family: inherit; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 8px 8px 16px var(--shadow), -8px -8px 16px var(--white), inset 2px 2px 4px rgba(255,255,255,0.6), inset -2px -2px 4px rgba(0,0,0,0.03); }
        button:hover { transform: translateY(-2px); box-shadow: 10px 10px 20px var(--shadow), -10px -10px 20px var(--white), inset 2px 2px 4px rgba(255,255,255,0.6); }
        button:active { transform: translateY(2px); box-shadow: inset 6px 6px 12px var(--shadow), inset -6px -6px 12px var(--white); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: inset 6px 6px 12px var(--shadow), inset -6px -6px 12px var(--white); }

        #id-card { width: 320px; height: 500px; background: var(--card-bg); border-radius: 25px; box-shadow: 15px 15px 35px var(--shadow), -15px -15px 35px var(--white); position: relative; display: none; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; margin: 0 auto; }
        
        img[src=""] { display: none; }
        .logo-img { position: absolute; top: 15px; left: 20px; width: 90px; object-fit: contain; }
        .profile-img-frame { width: 130px; height: 160px; margin-top: 80px; border-radius: 20px; background: var(--card-bg); box-shadow: 10px 10px 20px var(--card-shadow), -10px -10px 20px var(--white); overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .profile-img-frame img { width: 100%; height: 100%; object-fit: cover; }
        .qr-area { width: 65px; height: 65px; margin: 15px 0; padding: 5px; background: white; border-radius: 12px; box-shadow: 5px 5px 10px var(--card-shadow); }
        .info { text-align: center; }
        .info h3 { margin: 5px 0; font-size: 1.2rem; color: #2d3436; text-transform: uppercase;}
        .info p { margin: 2px 0; font-size: 0.85rem; opacity: 0.8; }

        .emp-list { width: 100%; max-width: 420px; }
        .emp-card { background: var(--bg); padding: 20px; margin: 20px 0; border-radius: 25px; box-shadow: 10px 10px 20px var(--shadow), -10px -10px 20px var(--white); display: flex; flex-direction: column; gap: 15px; }
        .emp-info { border-bottom: 2px solid #d3cec4; padding-bottom: 10px; }
        .action-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: space-between; }
        .action-group button { margin: 0; padding: 10px; width: 47%; font-size: 12px; border-radius: 15px; }

        .custom-notif { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(234, 230, 223, 0.8); backdrop-filter: blur(5px); z-index: 9999; display: none; justify-content: center; align-items: center; }
        .notif-box { background: var(--bg); padding: 30px; border-radius: 30px; box-shadow: 20px 20px 60px var(--shadow), -20px -20px 60px var(--white); text-align: center; width: 80%; max-width: 300px; }
        .btn-group-notif { display: flex; gap: 10px; margin-top: 20px; }

        #card-action-btns { display: none; width: 100%; max-width: 320px; margin-top: 15px; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

    <div id="notifOverlay" class="custom-notif">
        <div class="notif-box">
            <p id="notifText" style="font-weight: 600;">Pesan disini</p>
            <button onclick="tutupNotif()">Tutup</button>
        </div>
    </div>

    <div id="confirmOverlay" class="custom-notif">
        <div class="notif-box">
            <p style="font-weight: 600; color: #c0392b;">Yakin mau hapus data pegawai ini secara permanen?</p>
            <div class="btn-group-notif">
                <button onclick="tutupConfirm()" style="color: #504e4a;">Batal</button>
                <button onclick="eksekusiHapus()" style="color: #c0392b;">Ya, Hapus!</button>
            </div>
        </div>
    </div>

    <div class="glass-panel" id="adminPanel">
        <h2 style="text-align: center; margin-bottom: 25px;">YMAP Registration</h2>
        <form id="ymapForm">
            <input type="text" id="nama" placeholder="Nama Lengkap" required>
            <input type="text" id="jabatan" placeholder="Jabatan" required>
            <input type="text" id="no_hp" placeholder="Nomor HP / WA" required>
            <input type="text" id="alamat" placeholder="Alamat Sesuai KTP" required>
            <p style="font-size: 12px; margin: 15px 0 5px 10px; opacity: 0.7; font-weight: 600;">Upload Foto Profil:</p>
            <input type="file" id="foto" accept="image/*" required>
            <p style="font-size: 12px; margin: 15px 0 5px 10px; opacity: 0.7; font-weight: 600;">Upload Foto KTP:</p>
            <input type="file" id="ktp" accept="image/*" required>
            <button type="button" onclick="simpanData()" id="btnSubmit">Daftarkan Pegawai</button>
        </form>
    </div>

    <div id="id-card">
        <img src="logo.png" id="cardLogo" class="logo-img" onerror="this.style.display='none'"> 
        <div class="profile-img-frame">
            <img src="" id="cardPhoto">
        </div>
        <div id="cardQr" class="qr-area"></div>
        <div class="info">
            <p id="cardId" style="font-weight: bold; color: #888; font-size: 10px;"></p>
            <h3 id="cardNama"></h3>
            <p id="cardJabatan"></p>
            <p id="cardHp"></p>
        </div>
    </div>
    
    <div id="card-action-btns">
        <button id="btnDownload" style="background: #27ae60; color: white; margin: 0;" onclick="downloadPDF()">Download ID Card (PDF)</button>
        <button onclick="tutupCard()" style="background: #e74c3c; color: white; margin: 0;">Tutup Preview Card</button>
    </div>

    <div class="emp-list">
        <h3 style="text-align: center; margin-top: 30px;">Daftar Pegawai</h3>
        <input type="text" id="inputCari" placeholder="🔍 Cari nama atau jabatan..." onkeyup="cariPegawai()" style="margin-bottom: 10px;">
        
        <div id="empListArea"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Aplikasi Offline Siap!'))
                    .catch(err => console.log('Gagal Offline', err));
            });
        }

        const API_URL = "https://script.google.com/macros/s/AKfycbzQvLREqybEVszpuioTayyZovgXKqtNDrNFt_mxpWoc4RXiawn7JFVyUpnzfYR0LeHkIQ/exec"; // <--- JANGAN LUPA ISI API KAMU DISINI
        let globalData = [];
        let editModeId = null; 
        let hapusModeId = null;

        function tampilNotif(pesan) { document.getElementById('notifText').innerText = pesan; document.getElementById('notifOverlay').style.display = 'flex'; }
        function tutupNotif() { document.getElementById('notifOverlay').style.display = 'none'; }
        function bukaConfirm(id) { hapusModeId = id; document.getElementById('confirmOverlay').style.display = 'flex'; }
        function tutupConfirm() { hapusModeId = null; document.getElementById('confirmOverlay').style.display = 'none'; }

        async function fetchPegawai() {
            try {
                const res = await fetch(API_URL);
                globalData = await res.json();
                const urlParams = new URLSearchParams(window.location.search);
                const viewId = urlParams.get('view');

                if(viewId) {
                    document.getElementById('adminPanel').style.display = 'none';
                    document.querySelector('.emp-list').style.display = 'none';
                    lihatCard(viewId);
                    return; 
                }

                // Render List Awal
                renderList(globalData);
            } catch(e) { tampilNotif("Gagal memuat daftar pegawai."); }
        }

        // FUNGSI RENDER LIST (Supaya gampang dipakai buat pencarian)
        function renderList(dataArray) {
            const container = document.getElementById('empListArea');
            container.innerHTML = ''; 
            
            if (dataArray.length === 0) {
                container.innerHTML = '<p style="text-align:center; opacity:0.6; margin-top:20px;">Pegawai tidak ditemukan.</p>';
                return;
            }

            dataArray.forEach(emp => {
                container.innerHTML += `
                    <div class="emp-card">
                        <div class="emp-info">
                            <b style="font-size: 1.1rem;">${emp.nama}</b><br>
                            <small style="opacity: 0.8;">${emp.jabatan}</small>
                        </div>
                        <div class="action-group">
                            <button onclick="lihatCard('${emp.fileId}')" style="color: #2980b9;">Lihat Card</button>
                            <button onclick="window.open('https://drive.google.com/uc?id=${emp.id_ktp_file}')" style="color: #8e44ad;">Lihat KTP</button>
                            <button onclick="siapkanEdit('${emp.fileId}')" style="color: #d35400;">Edit Data</button>
                            <button onclick="bukaConfirm('${emp.fileId}')" style="color: #c0392b;">Hapus</button>
                        </div>
                    </div>`;
            });
        }

        // FUNGSI PENCARIAN PEGAWAI LIVE
        function cariPegawai() {
            const keyword = document.getElementById('inputCari').value.toLowerCase();
            const filteredData = globalData.filter(emp => 
                emp.nama.toLowerCase().includes(keyword) || 
                emp.jabatan.toLowerCase().includes(keyword)
            );
            renderList(filteredData);
        }

        function siapkanEdit(id) {
            const emp = globalData.find(e => e.fileId === id);
            if(!emp) return;
            document.getElementById('nama').value = emp.nama;
            document.getElementById('jabatan').value = emp.jabatan;
            document.getElementById('no_hp').value = emp.no_hp;
            document.getElementById('alamat').value = emp.alamat;
            editModeId = id; document.getElementById('btnSubmit').innerText = "Update Data Pegawai";
            document.getElementById('foto').required = false; document.getElementById('ktp').required = false;
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        async function eksekusiHapus() {
            if(!hapusModeId) return;
            tutupConfirm(); 
            tampilNotif("Sedang menghapus data...");
            
            try {
                const response = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "delete", fileId: hapusModeId }) 
                });
                
                const result = await response.json();
                if(result.status === "success") {
                    tutupNotif(); 
                    tampilNotif("Data berhasil dihapus!");
                    document.getElementById('inputCari').value = ""; // Reset kolom cari
                    fetchPegawai(); 
                } else {
                    tampilNotif("Gagal menghapus dari Drive.");
                }
            } catch(e) { 
                tampilNotif("Gagal menghapus data. Periksa koneksi."); 
            }
            hapusModeId = null;
        }

        async function simpanData() {
            const btn = document.getElementById('btnSubmit');
            const fotoFile = document.getElementById('foto').files[0];
            const ktpFile = document.getElementById('ktp').files[0];
            if(!editModeId && (!fotoFile || !ktpFile || !document.getElementById('nama').value)) { return tampilNotif("Lengkapi semua data & foto untuk pegawai baru!"); }
            btn.innerText = "Diproses..."; btn.disabled = true;

            const toBase64 = file => new Promise((resolve) => {
                if(!file) return resolve(null);
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
            });

            let payload = {
                action: editModeId ? "edit" : "add", fileId: editModeId, 
                formData: { nama: document.getElementById('nama').value, jabatan: document.getElementById('jabatan').value, no_hp: document.getElementById('no_hp').value, alamat: document.getElementById('alamat').value }
            };

            if(!editModeId) {
                payload.photo = { blob: await toBase64(fotoFile), mimeType: fotoFile.type };
                payload.ktp = { blob: await toBase64(ktpFile), mimeType: ktpFile.type };
            } else {
                const empLama = globalData.find(e => e.fileId === editModeId);
                payload.formData.id_ktp_file = empLama.id_ktp_file; 
            }

            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                tampilNotif(editModeId ? "Data berhasil diupdate!" : "Pegawai baru didaftarkan!");
                document.getElementById('ymapForm').reset(); editModeId = null; 
                document.getElementById('btnSubmit').innerText = "Daftarkan Pegawai";
                document.getElementById('foto').required = true; document.getElementById('ktp').required = true;
                document.getElementById('inputCari').value = ""; // Reset kolom pencarian
                fetchPegawai(); 
            } catch(e) { tampilNotif("Terjadi kesalahan sistem."); btn.disabled = false; }
            btn.disabled = false;
        }

        async function lihatCard(id) {
            const emp = globalData.find(e => e.fileId === id);
            if(!emp) return;

            document.getElementById('cardNama').innerText = emp.nama;
            document.getElementById('cardJabatan').innerText = emp.jabatan;
            document.getElementById('cardHp').innerText = emp.no_hp;
            document.getElementById('cardId').innerText = "ID: " + emp.fileId.substring(0, 8).toUpperCase();
            document.getElementById('cardLogo').style.display = 'block';

            const photoEl = document.getElementById('cardPhoto');
            photoEl.style.display = 'block';
            photoEl.src = emp.photoUrl; 

            const urlUtama = window.location.href.split('?')[0]; 
            const linkVerifikasi = `${urlUtama}?view=${emp.fileId}`;
            document.getElementById('cardQr').innerHTML = "";
            new QRCode(document.getElementById('cardQr'), { text: linkVerifikasi, width: 65, height: 65 });

            document.getElementById('id-card').style.display = 'flex';
            
            const btnContainer = document.getElementById('card-action-btns');
            const btnDl = document.getElementById('btnDownload');

            if(!window.location.search.includes('view=')) {
                btnContainer.style.display = 'flex';
                btnDl.innerText = "Memuat Kualitas HD... Sabar Ya";
                btnDl.disabled = true;
                btnDl.style.background = "#95a5a6";
            }

            document.getElementById('id-card').scrollIntoView({ behavior: 'smooth' });

            try {
                const resGambar = await fetch(API_URL + "?action=getImage&id=" + emp.fileId);
                const base64Murni = await resGambar.text();
                if(base64Murni.startsWith('data:image')) {
                    photoEl.src = base64Murni; 
                }
            } catch(e) { console.log("Gambar HD gagal dimuat"); }

            if(!window.location.search.includes('view=')) {
                btnDl.innerText = "Download ID Card (PDF)";
                btnDl.disabled = false;
                btnDl.style.background = "#27ae60";
            }
        }

        function tutupCard() {
            document.getElementById('id-card').style.display = 'none';
            document.getElementById('card-action-btns').style.display = 'none';
            document.querySelector('.emp-list').scrollIntoView({ behavior: 'smooth' });
        }

        async function downloadPDF() {
            tampilNotif("Menyiapkan PDF...");
            const card = document.getElementById('id-card');
            
            try {
                const canvas = await html2canvas(card, { 
                    scale: 3, 
                    useCORS: true, 
                    allowTaint: false,
                    backgroundColor: "#F2EFE8" 
                });
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', [85.6, 54]); 
                pdf.addImage(imgData, 'PNG', 0, 0, 54, 85.6);
                pdf.save(`ID_CARD_${document.getElementById('cardNama').innerText}.pdf`);
                tutupNotif();
            } catch (err) { tampilNotif("Gagal membuat PDF. Coba lagi."); }
        }

        window.onload = fetchPegawai;
    </script>
</body>
</html>
